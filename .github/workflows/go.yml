name: Go Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            IFS=/ read -r goos goarch <<< "$target"

            suffix=""
            if [ "$goos" = "windows" ]; then
              suffix=".exe"
            fi

            echo "Building tunnel-server and tunnel-client for $goos/$goarch"

            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags "-s -w -X main.version=${TAG}" -o "dist/tunnel-server-${TAG}-${goos}-${goarch}${suffix}" ./cmd/tunnel-server
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags "-s -w -X main.version=${TAG}" -o "dist/tunnel-client-${TAG}-${goos}-${goarch}${suffix}" ./cmd/tunnel-client
          done

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}